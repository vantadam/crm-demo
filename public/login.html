<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #e8ff47;
    --text: #f0f0f5;
    --muted: #6b6b80;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: grid;
    place-items: center;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: absolute;
    top: -200px; right: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(232,255,71,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 56px 48px;
    width: 100%;
    max-width: 420px;
    position: relative;
  }
  .login-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
  }
  .brand {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 28px;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
  }
  .brand span { color: var(--accent); }
  .subtitle {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 40px;
  }
  label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 14px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 24px;
  }
  input:focus { border-color: var(--accent); }
  button[type="submit"] {
    width: 100%;
    background: var(--accent);
    color: #0a0a0f;
    border: none;
    padding: 15px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  button[type="submit"]:hover { opacity: 0.85; }
  .error { color: #ff6b6b; font-size: 13px; margin-top: 16px; }
</style>
</head>
<body>
<div class="login-card">
  <div class="brand">CLIENT<span>HUB</span></div>
  <div class="subtitle">Customer Relationship Management</div>
  <label>Username</label>
  <input type="text" id="username" placeholder="Enter username">
  <label>Password</label>
  <input type="password" id="password" placeholder="Enter password">
  <button type="submit" onclick="login()">Sign In</button>
  <div class="error" id="err"></div>
</div>
<script>
async function login() {
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const res = await fetch('/api/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, password })
  });
  const data = await res.json();
  if (data.success) window.location.href = '/clients.html';
  else document.getElementById('err').textContent = data.error || 'Login failed';
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
