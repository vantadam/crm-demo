<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM — Campaigns</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #111118; --surface2: #16161f;
    --border: #1e1e2e; --accent: #e8ff47; --text: #f0f0f5; --muted: #6b6b80;
  }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
  nav { display: flex; align-items: center; justify-content: space-between; padding: 0 40px; height: 60px; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
  .brand { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; }
  .brand span { color: var(--accent); }
  .nav-links { display: flex; gap: 32px; }
  .nav-links a { color: var(--muted); text-decoration: none; font-size: 14px; font-weight: 500; transition: color 0.2s; }
  .nav-links a.active { color: var(--text); border-bottom: 2px solid var(--accent); padding-bottom: 2px; }
  .logout-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 7px 16px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; transition: all 0.2s; }
  .logout-btn:hover { border-color: var(--muted); color: var(--text); }
  main { padding: 40px; max-width: 1400px; margin: 0 auto; }
  .page-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 32px; }
  h1 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 36px; letter-spacing: -1px; }
  h1 span { color: var(--accent); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
  .panel { background: var(--surface); border: 1px solid var(--border); padding: 32px; }
  .panel-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 18px; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
  .form-group { margin-bottom: 20px; }
  label { display: block; font-size: 11px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  input[type="text"], input[type="email"], select, textarea {
    width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 11px 14px; font-family: 'DM Sans', sans-serif; font-size: 14px;
    outline: none; transition: border-color 0.2s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  select option { background: var(--surface2); }
  textarea.html-editor { font-family: 'Courier New', monospace; font-size: 13px; height: 320px; resize: vertical; }
  .btn { padding: 11px 22px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all 0.2s; }
  .btn-primary { background: var(--accent); color: #0a0a0f; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; letter-spacing: 0.5px; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--muted); }
  .vars-hint { background: var(--surface2); border: 1px solid var(--border); padding: 14px 16px; margin-bottom: 20px; font-size: 12px; line-height: 1.8; }
  .vars-hint strong { color: var(--accent); font-family: 'Courier New', monospace; }
  .preview-frame { width: 100%; height: 320px; border: 1px solid var(--border); background: #fff; }
  .toggle-row { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .toggle-row label { margin: 0; font-size: 13px; text-transform: none; letter-spacing: 0; color: var(--text); }
  input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
  .recipient-info { background: var(--surface2); border: 1px solid var(--border); padding: 16px; font-size: 13px; color: var(--muted); margin-top: 12px; }
  .recipient-info strong { color: var(--accent); font-size: 20px; font-family: 'Syne', sans-serif; display: block; margin-bottom: 4px; }
  .actions-row { display: flex; gap: 12px; margin-top: 28px; }
  .toast { position: fixed; bottom: 32px; right: 32px; background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--accent); padding: 16px 24px; font-size: 14px; z-index: 9999; transform: translateY(80px); opacity: 0; transition: all 0.3s; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .full-col { grid-column: 1 / -1; }
</style>
</head>
<body>
<nav>
  <div class="brand">CLIENT<span>HUB</span></div>
  <div class="nav-links">
    <a href="/clients.html">Clients</a>
    <a href="/campaigns.html" class="active">Campaigns</a>
    <a href="/campaign-status.html">Status</a>
    <a href="/sms.html">Messaging</a>
  </div>
  <button class="logout-btn" onclick="logout()">Sign Out</button>
</nav>
<main>
  <div class="page-header">
    <h1>New <span>Campaign</span></h1>
    <a href="/campaign-status.html" class="btn btn-secondary">View All Campaigns →</a>
  </div>

  <div class="grid">
    <!-- LEFT: Campaign settings -->
    <div>
      <div class="panel">
        <div class="panel-title">Campaign Settings</div>

        <div class="form-group">
          <label>Campaign Title (internal)</label>
          <input type="text" id="camp-title" placeholder="e.g. Summer Promo 2025">
        </div>
        <div class="form-group">
          <label>Sender Name</label>
          <input type="text" id="sender-name" value="fmevenement.ca">
        </div>
        <div class="form-group">
          <label>Email Subject</label>
          <input type="text" id="camp-subject" placeholder="e.g. Découvrez nos nouveaux événements !">
        </div>

        <div class="form-group">
          <label>Recipients</label>
          <select id="recipient-mode" onchange="updateRecipientMode()">
            <option value="all">All clients with email</option>
            <option value="tag">Filter by tag</option>
          </select>
        </div>

        <div class="form-group" id="tag-group" style="display:none">
          <label>Tag</label>
          <select id="recipient-tag" onchange="updateCount()">
            <option value="">Select tag...</option>
          </select>
        </div>

        <div class="recipient-info" id="recipient-info">
          <strong id="recipient-count">—</strong>
          recipients will receive this campaign
        </div>

        <div class="toggle-row" style="margin-top:20px">
          <input type="checkbox" id="priority-check">
          <label for="priority-check">Prioritize most recently active clients first</label>
        </div>

        <div class="actions-row">
          <button class="btn btn-secondary" onclick="saveDraft()">Save as Draft</button>
          <button class="btn btn-primary" onclick="createAndStart()">Create & Start</button>
        </div>
      </div>
    </div>

    <!-- RIGHT: HTML Editor + Preview -->
    <div style="display:flex;flex-direction:column;gap:24px">
      <div class="panel">
        <div class="panel-title">HTML Body</div>
        <div class="vars-hint">
          Available variables: <strong>{{first_name}}</strong> <strong>{{last_name}}</strong>
          <strong>{{email}}</strong> <strong>{{city}}</strong> <strong>{{state}}</strong>
          <strong>{{country}}</strong> <strong>{{postcode}}</strong>
        </div>
        <textarea class="html-editor" id="html-body" oninput="updatePreview()" placeholder="<p>Bonjour {{first_name}},</p>
<p>Votre message ici...</p>"></textarea>
      </div>

      <div class="panel">
        <div class="panel-title">Preview</div>
        <iframe class="preview-frame" id="preview-frame"></iframe>
      </div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
let categories = [];

async function load() {
  categories = await fetch('/api/clients/categories').then(r => r.json());
  const sel = document.getElementById('recipient-tag');
  sel.innerHTML = '<option value="">Select tag...</option>' +
    categories.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
  updateCount();
}

function updateRecipientMode() {
  const mode = document.getElementById('recipient-mode').value;
  document.getElementById('tag-group').style.display = mode === 'tag' ? 'block' : 'none';
  updateCount();
}

async function updateCount() {
  const mode = document.getElementById('recipient-mode').value;
  const tag  = document.getElementById('recipient-tag').value;
  let url = '/api/clients';
  const clients = await fetch(url).then(r => r.json());

  let count;
  if (mode === 'all') {
    count = clients.filter(c => c.email).length;
  } else {
    count = clients.filter(c => c.email && (c.categories || []).includes(tag)).length;
  }
  document.getElementById('recipient-count').textContent = count.toLocaleString();
}

function updatePreview() {
  const html = document.getElementById('html-body').value;
  const doc = document.getElementById('preview-frame').contentDocument;
  doc.open(); doc.write(html); doc.close();
}

async function createCampaign(startAfter) {
  const title    = document.getElementById('camp-title').value.trim();
  const subject  = document.getElementById('camp-subject').value.trim();
  const sender   = document.getElementById('sender-name').value.trim();
  const html     = document.getElementById('html-body').value.trim();
  const priority = document.getElementById('priority-check').checked;
  const mode     = document.getElementById('recipient-mode').value;
  const tag      = document.getElementById('recipient-tag').value;

  if (!title)   return showToast('Campaign title is required');
  if (!subject) return showToast('Subject is required');
  if (!html)    return showToast('HTML body is required');

  const body = {
    title, subject,
    sender_name: sender,
    html_body: html,
    priority,
    recipient_mode: mode,
    tag: mode === 'tag' ? tag : undefined
  };

  const res = await fetch('/api/campaigns', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  const data = await res.json();
  if (!res.ok) return showToast(data.error || 'Error creating campaign');

  if (startAfter) {
    await fetch(`/api/campaigns/${data.id}/start`, { method: 'PATCH' });
    showToast('Campaign started! Redirecting...');
  } else {
    showToast('Draft saved!');
  }

  setTimeout(() => window.location.href = '/campaign-status.html', 1200);
}

function saveDraft()       { createCampaign(false); }
function createAndStart()  { createCampaign(true);  }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

async function logout() {
  await fetch('/api/auth/logout', { method: 'POST' });
  window.location.href = '/login.html';
}

load();
</script>
</body>
</html>
