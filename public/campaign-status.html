<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM — Campaign Status</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #0a0a0f; --surface: #111118; --surface2: #16161f; --border: #1e1e2e; --accent: #e8ff47; --text: #f0f0f5; --muted: #6b6b80; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
  nav { display: flex; align-items: center; justify-content: space-between; padding: 0 40px; height: 60px; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
  .brand { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; }
  .brand span { color: var(--accent); }
  .nav-links { display: flex; gap: 32px; }
  .nav-links a { color: var(--muted); text-decoration: none; font-size: 14px; font-weight: 500; transition: color 0.2s; }
  .nav-links a.active { color: var(--text); border-bottom: 2px solid var(--accent); padding-bottom: 2px; }
  .logout-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 7px 16px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; }
  .logout-btn:hover { border-color: var(--muted); color: var(--text); }
  main { padding: 40px; max-width: 1200px; margin: 0 auto; }
  .page-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 32px; }
  h1 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 36px; letter-spacing: -1px; }
  h1 span { color: var(--accent); }
  .btn { padding: 9px 18px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all 0.2s; }
  .btn-primary { background: var(--accent); color: #0a0a0f; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--muted); }
  .btn-danger { background: transparent; color: #ff6b6b; border: 1px solid #ff6b6b33; font-size: 12px; padding: 6px 12px; }
  .btn-danger:hover { background: #ff6b6b15; }
  .campaign-card {
    background: var(--surface); border: 1px solid var(--border);
    margin-bottom: 20px; overflow: hidden;
  }
  .card-header { padding: 24px 28px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  .card-left { flex: 1; min-width: 0; }
  .camp-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 18px; margin-bottom: 4px; }
  .camp-subject { color: var(--muted); font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-right { display: flex; gap: 10px; align-items: center; flex-shrink: 0; }
  .status-badge {
    padding: 4px 12px; font-size: 11px; font-weight: 600;
    letter-spacing: 1px; text-transform: uppercase;
  }
  .badge-running { background: rgba(232,255,71,0.15); color: var(--accent); border: 1px solid rgba(232,255,71,0.3); }
  .badge-paused  { background: rgba(107,107,128,0.15); color: var(--muted);  border: 1px solid var(--border); }
  .badge-done    { background: rgba(74,222,128,0.1);   color: #4ade80;       border: 1px solid rgba(74,222,128,0.2); }
  .badge-draft   { background: rgba(107,107,128,0.1);  color: var(--muted);  border: 1px solid var(--border); }
  .progress-section { padding: 0 28px 24px; }
  .progress-stats { display: flex; gap: 32px; margin-bottom: 14px; font-size: 13px; }
  .prog-stat { display: flex; flex-direction: column; }
  .prog-stat span:first-child { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 700; }
  .prog-stat span:last-child  { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
  .prog-stat .c-sent   { color: var(--accent); }
  .prog-stat .c-failed { color: #ff6b6b; }
  .prog-stat .c-pending{ color: var(--muted); }
  .progress-bar-wrap { height: 6px; background: var(--surface2); border: 1px solid var(--border); }
  .progress-bar-fill { height: 100%; background: var(--accent); transition: width 0.5s ease; }
  .progress-pct { text-align: right; font-size: 12px; color: var(--muted); margin-top: 6px; }
  .card-footer { border-top: 1px solid var(--border); padding: 12px 28px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--muted); }
  .detail-toggle { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 12px; font-family: 'DM Sans', sans-serif; }
  .failures-panel { display: none; border-top: 1px solid var(--border); padding: 20px 28px; background: var(--surface2); }
  .failures-panel.open { display: block; }
  .failures-panel h4 { font-size: 12px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 12px; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); }
  td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
  .empty-state { text-align: center; padding: 80px 20px; color: var(--muted); }
  .empty-state h3 { font-family: 'Syne', sans-serif; font-size: 22px; margin-bottom: 8px; color: var(--text); }
  .live-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; display: inline-block; margin-right: 6px; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .toast { position: fixed; bottom: 32px; right: 32px; background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--accent); padding: 16px 24px; font-size: 14px; z-index: 9999; transform: translateY(80px); opacity: 0; transition: all 0.3s; }
  .toast.show { transform: translateY(0); opacity: 1; }
</style>
</head>
<body>
<nav>
  <div class="brand">CLIENT<span>HUB</span></div>
  <div class="nav-links">
    <a href="/clients.html">Clients</a>
    <a href="/campaigns.html">Campaigns</a>
    <a href="/campaign-status.html" class="active">Status</a>
    <a href="/sms.html">Messaging</a>
  </div>
  <button class="logout-btn" onclick="logout()">Sign Out</button>
</nav>
<main>
  <div class="page-header">
    <h1>Campaign <span>Status</span></h1>
    <div style="display:flex;align-items:center;gap:16px">
      <span style="font-size:13px;color:var(--muted)"><span class="live-dot"></span>Auto-refreshes every 10s</span>
      <a href="/campaigns.html" class="btn btn-primary">+ New Campaign</a>
    </div>
  </div>

  <div id="campaigns-list"></div>
</main>

<div class="toast" id="toast"></div>

<script>
let openFailures = new Set();

async function load() {
  const campaigns = await fetch('/api/campaigns').then(r => r.json());
  const container = document.getElementById('campaigns-list');

  if (!campaigns.length) {
    container.innerHTML = `
      <div class="empty-state">
        <h3>No campaigns yet</h3>
        <p>Create your first campaign to start sending</p>
      </div>`;
    return;
  }

  container.innerHTML = campaigns.map(c => {
    const pending = c.total - c.sent - c.failed;
    const pct = c.total ? Math.round((c.sent + c.failed) / c.total * 100) : 0;
    const isRunning = c.status === 'running';
    const isDraft   = c.status === 'draft';
    const isPaused  = c.status === 'paused';
    const isDone    = c.status === 'done';

    return `
    <div class="campaign-card" id="card-${c.id}">
      <div class="card-header">
        <div class="card-left">
          <div class="camp-title">${c.title}</div>
          <div class="camp-subject">Subject: ${c.subject}</div>
        </div>
        <div class="card-right">
          <span class="status-badge badge-${c.status}">${c.status}</span>
          ${isDraft   ? `<button class="btn btn-primary" onclick="startCampaign(${c.id})">Start</button>` : ''}
          ${isPaused  ? `<button class="btn btn-primary" onclick="startCampaign(${c.id})">Resume</button>` : ''}
          ${isRunning ? `<button class="btn btn-secondary" onclick="pauseCampaign(${c.id})">Pause</button>` : ''}
          ${(isDone || isDraft || isPaused) ? `<button class="btn btn-danger" onclick="deleteCampaign(${c.id})">Delete</button>` : ''}
        </div>
      </div>

      <div class="progress-section">
        <div class="progress-stats">
          <div class="prog-stat"><span class="c-sent">${c.sent.toLocaleString()}</span><span>Sent</span></div>
          <div class="prog-stat"><span class="c-failed">${c.failed.toLocaleString()}</span><span>Failed</span></div>
          <div class="prog-stat"><span class="c-pending">${pending.toLocaleString()}</span><span>Pending</span></div>
          <div class="prog-stat"><span>${c.total.toLocaleString()}</span><span>Total</span></div>
        </div>
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" style="width:${pct}%"></div>
        </div>
        <div class="progress-pct">${pct}% processed</div>
      </div>

      <div class="card-footer">
        <span>Created ${new Date(c.created_at).toLocaleString()}
          ${c.started_at  ? ' · Started '  + new Date(c.started_at).toLocaleString()  : ''}
          ${c.finished_at ? ' · Finished ' + new Date(c.finished_at).toLocaleString() : ''}
          ${c.priority ? ' · ⚡ Priority order' : ''}
        </span>
        ${c.failed > 0 ? `<button class="detail-toggle" onclick="toggleFailures(${c.id})">
          ${openFailures.has(c.id) ? 'Hide' : 'Show'} failures (${c.failed})
        </button>` : '<span></span>'}
      </div>

      <div class="failures-panel ${openFailures.has(c.id) ? 'open' : ''}" id="failures-${c.id}">
        <h4>Failed deliveries</h4>
        <div id="failures-content-${c.id}">Loading...</div>
      </div>
    </div>`;
  }).join('');
}

async function toggleFailures(id) {
  if (openFailures.has(id)) {
    openFailures.delete(id);
    document.getElementById(`failures-${id}`).classList.remove('open');
  } else {
    openFailures.add(id);
    document.getElementById(`failures-${id}`).classList.add('open');
    const data = await fetch(`/api/campaigns/${id}`).then(r => r.json());
    const rows = data.failures;
    document.getElementById(`failures-content-${id}`).innerHTML = rows.length
      ? `<table>
           <thead><tr><th>Name</th><th>Email</th><th>Error</th></tr></thead>
           <tbody>${rows.map(r => `
             <tr>
               <td>${r.first_name || ''} ${r.last_name || ''}</td>
               <td style="color:var(--muted)">${r.email}</td>
               <td style="color:#ff6b6b;font-size:12px">${r.error || '—'}</td>
             </tr>`).join('')}
           </tbody>
         </table>`
      : '<p style="color:var(--muted);font-size:13px">No failures recorded.</p>';
  }
  load();
}

async function startCampaign(id) {
  const r = await fetch(`/api/campaigns/${id}/start`, { method: 'PATCH' });
  const d = await r.json();
  if (!r.ok) return showToast(d.error || 'Error');
  showToast('Campaign started'); load();
}

async function pauseCampaign(id) {
  const r = await fetch(`/api/campaigns/${id}/pause`, { method: 'PATCH' });
  const d = await r.json();
  if (!r.ok) return showToast(d.error || 'Error');
  showToast('Campaign paused'); load();
}

async function deleteCampaign(id) {
  if (!confirm('Delete this campaign?')) return;
  await fetch(`/api/campaigns/${id}`, { method: 'DELETE' });
  showToast('Deleted'); load();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

async function logout() {
  await fetch('/api/auth/logout', { method: 'POST' });
  window.location.href = '/login.html';
}

load();
setInterval(load, 10000);
</script>
</body>
</html>
